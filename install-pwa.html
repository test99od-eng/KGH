<!DOCTYPE html>
<html>
<head>
    <title>PWA Installation Bridge</title>
</head>
<body>
    <script>
        if ('serviceWorker' in navigator) {
            // ប្រើ Link ផ្ទាល់ទៅកាន់ sw.js របស់អ្នក
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker Registered via Iframe!'))
            .catch(err => console.log('Registration failed:', err));
        }
    </script>
</body>
</html>
