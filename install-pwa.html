<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PWA Installation Bridge</title>
</head>
<body>
   <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: '/' })
    .then(reg => {
      console.log('PWA ដើរហើយ សម្រាប់ទំព័រ Blog Post!');
      reg.update();
    })
    .catch(err => console.log('Registration failed:', err));
  }
</script>
</body>
</html>
