<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PWA Installation Bridge</title>
</head>
<body>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: '/' })
    .then(reg => console.log('Registered for Blogspot!'))
    .catch(err => console.log('Failed:', err));
  }
</script>
</body>
</html>
